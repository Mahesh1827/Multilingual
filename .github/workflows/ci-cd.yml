name: CI-CD Pipeline

on:
  push:
  pull_request:
    branches:
      - main

# Opt into Node.js 24 now to avoid forced migration warnings.
# Remove this once all actions ship Node.js 24 by default (after June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ---------------------------------------------------------------
  # JOB 1: Lint and Test (runs on every push / PR)
  # ---------------------------------------------------------------
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU-only PyTorch
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Lint - critical errors
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint - style warnings
        run: |
          flake8 . \
            --count \
            --exit-zero \
            --max-line-length=120 \
            --statistics

      - name: Run tests with coverage
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-config=.coveragerc \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------
  # JOB 2: Build and Push Docker image (main branch only)
  # ---------------------------------------------------------------
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tirumala-ai
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------
  # JOB 3: Deploy to Production via SSH
  # Required secrets in GitHub → Settings → Secrets and variables → Actions:
  #   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, SSH_PORT,
  #   DEPLOY_PATH, DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build-push
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "═══ Deploying Tirumala AI Assistant ═══"

            # Navigate to project directory
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull the latest Docker image
            echo "Pulling latest image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tirumala-ai:latest

            # Restart only the API container with the new image
            echo "Restarting API container..."
            docker compose up -d --no-deps --force-recreate api

            # Clean up old/dangling images to free disk space
            echo "Cleaning up old images..."
            docker image prune -f

            # Verify the container is healthy
            echo "Waiting for health check..."
            sleep 15
            if docker compose ps api | grep -q "healthy"; then
              echo "✅ Deployment successful — API is healthy!"
            else
              echo "⚠️  API container is running but not yet healthy."
              echo "    Check logs: docker compose logs -f api"
            fi
