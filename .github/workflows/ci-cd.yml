name: CI-CD Pipeline

on:
  push:
  pull_request:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------
  # JOB 1: Lint and Test (runs on every push / PR)
  # ---------------------------------------------------------------
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU-only PyTorch
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Lint - critical errors
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint - style warnings
        run: |
          flake8 . \
            --count \
            --exit-zero \
            --max-line-length=120 \
            --statistics

      - name: Run tests with coverage
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-config=.coveragerc \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------
  # JOB 2: Build and Push Docker image (main branch only)
  # ---------------------------------------------------------------
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tirumala-ai
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------
  # JOB 3: Deploy via SSH — DISABLED (no production server configured)
  # Uncomment and set SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, SSH_PORT
  # secrets in GitHub → Settings → Secrets and variables → Actions
  # when you have a production server ready.
  # ---------------------------------------------------------------
  # deploy:
  #   name: Deploy to Production
  #   runs-on: ubuntu-latest
  #   needs: docker-build-push
  #   ...
