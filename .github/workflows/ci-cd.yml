name: CI-CD Pipeline

on:
  push:
  pull_request:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------
  # JOB 1: Lint and Test (runs on every push / PR)
  # ---------------------------------------------------------------
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU-only PyTorch
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Lint - critical errors
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint - style warnings
        run: |
          flake8 . \
            --count \
            --exit-zero \
            --max-line-length=120 \
            --statistics

      - name: Run tests with coverage
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-config=.coveragerc \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------
  # JOB 2: Build and Push Docker image (main branch only)
  # ---------------------------------------------------------------
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tirumala-ai
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------
  # JOB 3: Deploy via SSH (main branch only, after Docker push)
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build-push
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # NOTE: 'environment.url' cannot use secrets — use static URL or omit
    environment:
      name: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 300s
          script: |
            set -e
            DEPLOY_DIR="$HOME/tirumala-ai"
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/tirumala-ai:latest"
            echo "=== [1/6] Pulling latest image ==="
            docker pull "$IMAGE"
            echo "=== [2/6] Stopping old container ==="
            docker stop tirumala-api 2>/dev/null || true
            docker rm   tirumala-api 2>/dev/null || true
            echo "=== [3/6] Ensuring named volumes ==="
            docker volume create tirumala_model_cache 2>/dev/null || true
            docker volume create tirumala_vector_store 2>/dev/null || true
            docker volume create tirumala_ollama_data  2>/dev/null || true
            echo "=== [4/6] Starting Ollama ==="
            docker start tirumala-ollama 2>/dev/null || \
            docker run -d \
              --name tirumala-ollama \
              --restart unless-stopped \
              -p 11434:11434 \
              -v tirumala_ollama_data:/root/.ollama \
              ollama/ollama:latest
            echo "=== [5/6] Starting API container ==="
            docker run -d \
              --name tirumala-api \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file "$DEPLOY_DIR/.env" \
              -e OLLAMA_BASE_URL=http://tirumala-ollama:11434 \
              -e HF_HOME=/app/.cache/model_cache/huggingface \
              -e HF_HUB_CACHE=/app/.cache/model_cache/huggingface/hub \
              -e TRANSFORMERS_CACHE=/app/.cache/model_cache/huggingface/hub \
              -e TORCH_HOME=/app/.cache/model_cache/torch \
              -v tirumala_model_cache:/app/.cache/model_cache \
              -v tirumala_vector_store:/app/vector_store \
              --link tirumala-ollama:tirumala-ollama \
              "$IMAGE"
            echo "=== [6/6] Health check ==="
            for i in $(seq 1 18); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then echo "Health OK at attempt $i"; break; fi
              echo "Waiting... $i/18 (HTTP $STATUS)"; sleep 5
            done
            if [ "$STATUS" != "200" ]; then
              echo "ERROR: health check failed"
              docker logs tirumala-api --tail 50
              exit 1
            fi
            echo "=== Deployment complete ==="
            docker image prune -f
